# capa_claimdesk package manifest.
#
# An enterprise expense-reimbursement processing engine with an
# approval workflow, written in pure Capa. The domain core (Phase 1)
# is capability-free: money, the claim lifecycle, and the payment
# authorization token are pure data and pure transitions, so they run
# byte-identically under `--run` and `--wasm --run`.
#
# Dependency policy (deliberate):
#   Dependencies are declared in the phase that first imports them,
#   not all up front. `capa install` vendors and lockfile-pins exactly
#   what is reachable; declaring an unused dependency would vendor dead
#   code and carry a phantom lockfile entry, which dilutes the
#   supply-chain story this showcase is meant to make. Phase 3 (the
#   tamper-evident audit ledger and the @secret IBAN handling) is the
#   first phase to import an external library, so capa_hash is added
#   there. Phase 4 (the IO adapter layer) imports capa_csv for batch
#   claim import and report export, so it is added here. Each later
#   phase adds its dependencies in the same way (Phase 5 the CLI / log /
#   datetime trio, Phase 7 capa_sbom for the self-audit), all
#   cross-backend and pinned with the publisher verify_key
#   6C1D222D491FB88031E041A536CFB426101AA24B.
#
# Phase 5 (the full wiring + CLI + the remaining real capabilities)
# pulls in three more, all cross-backend and zero- or Stdio-only
# capability:
#
#     capa_cli       v0.1.2   the command-line front end (ArgSchema/parse/
#                             format_help); zero capabilities, pure parse.
#                             capa_cli and capa_csv both export a top-level
#                             `parse`; they coexist via selective import
#                             (a 1.2.0 feature), hence the `capa` floor.
#     capa_log       v0.1.2   structured audit logging across the pipeline
#                             (a Logger capability over Stdio).
#     capa_datetime  v0.1.2   ISO 8601 / date formatting of a fixed
#                             submission/decision instant; pure, no Clock
#                             needed to format.
#
# capa_hash (added in Phase 3) is pure and zero-capability: it provides
# the real HMAC-SHA256 used to chain the audit ledger and the keyed
# IBAN fingerprint, plus the constant-time tag comparison that verifies
# the chain. It does NOT widen the program's capability surface, so
# least-privilege still holds; `capa install` verifies it (GPG tag
# signature + SLSA provenance) before any check.
#
# capa_test is a dev-dependency: resolved only when this repository is
# the install root (running its own tests), never when cap_claimdesk
# is consumed downstream. It is pinned to its published tag with the
# publisher verify_key, the same git + tag + verify_key shape a real
# consumer uses, so `capa install` runs the full supply-chain check on
# it too.

[package]
name = "capa_claimdesk"
version = "0.1.0"
capa = ">=1.2.0"

[dependencies.capa_hash]
git = "https://github.com/nelsonduarte/capa_hash"
tag = "v0.1.2"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

# capa_csv (added in Phase 4) is pure and zero-capability: an RFC 4180
# parser, header view, and writer over Strings. Phase 4's intake adapter
# uses parse_headed to import a batch of claims from a CSV file (read
# through an attenuated Fs), and the CsvReporter uses write to emit the
# processing summary. It does NOT widen the program's capability surface.
[dependencies.capa_csv]
git = "https://github.com/nelsonduarte/capa_csv"
tag = "v0.1.1"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

[dependencies.capa_cli]
git = "https://github.com/nelsonduarte/capa_cli"
tag = "v0.1.2"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

[dependencies.capa_log]
git = "https://github.com/nelsonduarte/capa_log"
tag = "v0.1.2"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

[dependencies.capa_datetime]
git = "https://github.com/nelsonduarte/capa_datetime"
tag = "v0.1.2"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

# capa_sbom (added in Phase 7, the governance phase) is pure and
# zero-capability: a CycloneDX / SPDX parser and a set of read-only
# queries over the parsed model. The standalone governance/audit.capa
# imports it to close the loop, reading capa_claimdesk's own emitted
# CycloneDX SBOM back in and checking a governance policy against it
# (the pure core declares no capabilities; only authorized functions
# reach Net). It is NOT reachable from main.capa, so it does not appear
# in the program's own manifest/SBOM and does not widen its capability
# surface; it is the seventh seed library this showcase exercises.
[dependencies.capa_sbom]
git = "https://github.com/nelsonduarte/capa_sbom"
tag = "v0.1.0"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"

[dev-dependencies.capa_test]
git = "https://github.com/nelsonduarte/capa_test"
tag = "v0.1.1"
verify_key = "6C1D222D491FB88031E041A536CFB426101AA24B"
